<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>LABS67 — Офис</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; background:#0d1117; overflow:hidden; font-family:monospace; }
canvas { display:block; image-rendering:pixelated; }
#log {
  position:fixed; right:10px; top:10px;
  width:210px; background:rgba(13,17,23,0.93);
  border:1px solid #2a3140; border-radius:6px;
  padding:8px; font-size:11px; color:#8b949e;
  max-height:calc(100vh - 20px); overflow-y:auto;
}
.le { padding:2px 0; border-bottom:1px solid #1e2530; line-height:1.4; }
.lt { color:#3b4a5a; margin-right:3px; }
.n-Кай { color:#e8b84b; font-weight:bold; }
.n-Степа { color:#3fb950; font-weight:bold; }
.n-Татьяна { color:#ff7b72; font-weight:bold; }
.n-Геннадий { color:#f0883e; font-weight:bold; }
.n-Алексей { color:#bc8cff; font-weight:bold; }
#log-hdr { color:#e6edf3; font-size:11px; margin-bottom:5px; font-weight:bold; letter-spacing:1px; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="log"><div id="log-hdr">📋 ACTIVITY LOG</div></div>
<script>
const CV = document.getElementById('c');
const cx = CV.getContext('2d');
const LOG = document.getElementById('log');

function resize() {
  CV.width  = window.innerWidth - 232;
  CV.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── PALETTE ──────────────────────────────────
const BG    = '#0d1117';
const FL1   = '#13181f';
const FL2   = '#181e27';
const GRID  = '#1a2030';
const WALL  = '#1e2530';
const WALLT = '#252d3b';
const DESK  = '#252d3b';
const DESKT = '#2d3748';
const GOLD  = '#d4a843';
const BORD  = '#30363d';
const TXT   = '#e6edf3';
const TXDM  = '#8b949e';

// ── GRID ─────────────────────────────────────
const SZ = 52;   // cell size px
const COLS = 13;
const ROWS = 10;

function gx(c) { return c * SZ; }
function gy(r) { return r * SZ + 44; }  // 44 = header height

// ── SOUTH PARK CHARACTER DEFINITIONS ─────────
// Each agent: name, colors for jacket/hat/skin
const CHARS = {
  'Кай': {
    // Cartman: yellow hat, red jacket, round chubby face
    jacket: '#c0392b', hatBrim: '#e8b84b', hatTop: '#e8b84b',
    hatPom: '#fff', skin: '#f0d5a0', hair: '#4a3000',
    pants: '#2980b9', shoes: '#1a1a1a',
    scarf: null, earflap: true,
  },
  'Степа': {
    // Kyle: green hat, orange jacket
    jacket: '#e67e22', hatBrim: '#27ae60', hatTop: '#27ae60',
    hatPom: '#ff6b6b', skin: '#f0d5a0', hair: '#8B4513',
    pants: '#2c3e50', shoes: '#1a1a1a',
    scarf: null, earflap: false,
  },
  'Татьяна': {
    // Wendy: pink jacket, black hair, bow
    jacket: '#e91e8c', hatBrim: '#9b59b6', hatTop: '#9b59b6',
    hatPom: '#ff69b4', skin: '#f5c5a0', hair: '#1a1a1a',
    pants: '#8e44ad', shoes: '#1a1a1a',
    scarf: null, earflap: false, bow: true,
  },
  'Геннадий': {
    // Kenny: orange parka, mostly hidden face
    jacket: '#e67e22', hatBrim: '#e67e22', hatTop: '#e67e22',
    hatPom: '#fff', skin: '#f0d5a0', hair: '#5d4037',
    pants: '#795548', shoes: '#1a1a1a',
    scarf: '#e67e22', earflap: true,
  },
  'Алексей': {
    // Stan: red/blue hat, white pom, blue/red jacket
    jacket: '#2980b9', hatBrim: '#c0392b', hatTop: '#2980b9',
    hatPom: '#fff', skin: '#f0d5a0', hair: '#1a1a1a',
    pants: '#1a252f', shoes: '#1a1a1a',
    scarf: null, earflap: false,
  },
};

// ── FIXED DESK POSITIONS ──────────────────────
const DESK_POS = {
  'Кай':      { col: 1, row: 1 },
  'Степа':    { col: 4, row: 1 },
  'Татьяна':  { col: 1, row: 4 },
  'Геннадий': { col: 4, row: 4 },
  'Алексей':  { col: 7, row: 2 },
};

// POI world positions
const POI = {
  coffee: { col: 10, row: 1 },
  sofa:   { col: 9,  row: 6 },
};

// ── STATES & LABELS ───────────────────────────
const ST = {
  WORK:    'work',
  REST:    'rest',
  YOUTUBE: 'youtube',
  PORN:    'porn',
  TIRED:   'tired',
  WALK:    'walk',
  AT_POI:  'at_poi',
  RETURN:  'return',
};

const STATE_LABEL = {
  work:    '💻 Работает',
  rest:    '😴 Отдыхает',
  youtube: '▶️ YouTube',
  porn:    '🔞 Pornhub',
  tired:   '😓 Устал',
  walk:    '🚶 Идёт',
  at_poi:  '☕ Кофе',
  return:  '🚶 Возвращается',
};

// ── SPEECH PHRASES ────────────────────────────
const PHRASES = {
  work:    ['Пишу код...', 'Думаю...', 'Оптимизирую', 'Проверяю', 'Коммит!'],
  rest:    ['Устал...', 'Перерыв', '...zzz...', 'Пять минут'],
  youtube: ['Хахаха!', 'Интересно...', 'Что за видос', 'Лайк!'],
  porn:    ['...', '👀', 'Никто не видит?', 'Клёво...'],
  tired:   ['Всё, хватит', 'Голова болит', 'Пойду кофе'],
  walk:    ['Иду...', '...'],
  at_poi:  ['Ммм ☕', 'Заряжаюсь', 'Кофе = жизнь'],
  return:  ['Вернулся', 'Работаем!'],
};

function phrase(state) {
  const arr = PHRASES[state] || ['...'];
  return arr[Math.floor(Math.random() * arr.length)];
}

// ── LOG ───────────────────────────────────────
const logLines = [];
function addLog(name, text) {
  const ts = new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
  logLines.unshift({name, text, ts});
  if (logLines.length > 40) logLines.pop();
  LOG.innerHTML = '<div id="log-hdr">📋 ACTIVITY LOG</div>' +
    logLines.map(l => `<div class="le"><span class="lt">${l.ts}</span><span class="n-${l.name}">${l.name}</span>: ${l.text}</div>`).join('');
}

// ── AGENT INIT ────────────────────────────────
const agents = Object.entries(DESK_POS).map(([name, desk], i) => ({
  name,
  ch: CHARS[name],
  desk,
  x: gx(desk.col) + SZ,
  y: gy(desk.row) + SZ,
  tx: gx(desk.col) + SZ,
  ty: gy(desk.row) + SZ,
  state: ST.WORK,
  timer: 300 + i * 80 + Math.random() * 300,
  dest: null,
  bubble: '',
  bubbleTimer: 0,
  animT: Math.random() * Math.PI * 2,
  blinkT: 60 + Math.random() * 120,
  blink: false,
  sitting: true,
}));

// ── COLLISION CHECK ───────────────────────────
function posOccupied(x, y, self) {
  for (const a of agents) {
    if (a === self) continue;
    const dx = a.x - x, dy = a.y - y;
    if (Math.sqrt(dx*dx+dy*dy) < 28) return true;
  }
  return false;
}

function targetOccupied(col, row, self) {
  const tx = gx(col) + SZ/2;
  const ty = gy(row) + SZ/2;
  for (const a of agents) {
    if (a === self) continue;
    if (Math.abs(a.tx - tx) < 30 && Math.abs(a.ty - ty) < 30) return true;
    if (a.state === ST.AT_POI && a.dest === 'coffee' && col === POI.coffee.col && row === POI.coffee.row) return true;
  }
  return false;
}

// ── MOVEMENT ─────────────────────────────────
function moveTo(agent, col, row) {
  agent.tx = gx(col) + SZ/2;
  agent.ty = gy(row) + SZ/2;
}

function atTarget(agent) {
  return Math.abs(agent.x - agent.tx) < 2.5 && Math.abs(agent.y - agent.ty) < 2.5;
}

// ── STATE MACHINE ─────────────────────────────
function nextState(agent) {
  switch (agent.state) {

    case ST.WORK: {
      agent.timer--;
      if (agent.timer > 0) return;
      // choose next desk activity or get tired
      const r = Math.random();
      if (r < 0.35) {
        agent.state = ST.REST;
        agent.timer = 150 + Math.random()*150;
      } else if (r < 0.55) {
        agent.state = ST.YOUTUBE;
        agent.timer = 200 + Math.random()*200;
        addLog(agent.name, STATE_LABEL.youtube);
      } else if (r < 0.65) {
        agent.state = ST.PORN;
        agent.timer = 120 + Math.random()*120;
        addLog(agent.name, '🔞 открыл что-то...');
      } else {
        agent.state = ST.TIRED;
        agent.timer = 60 + Math.random()*60;
      }
      agent.bubble = phrase(agent.state);
      agent.bubbleTimer = 120;
      agent.sitting = true;
      break;
    }

    case ST.REST:
    case ST.YOUTUBE:
    case ST.PORN: {
      agent.timer--;
      if (agent.timer > 0) return;
      agent.state = ST.TIRED;
      agent.timer = 60;
      agent.bubble = phrase('tired');
      agent.bubbleTimer = 80;
      break;
    }

    case ST.TIRED: {
      agent.timer--;
      if (agent.timer > 0) return;
      // go coffee or sofa
      const wantCoffee = Math.random() < 0.65;
      const dest = wantCoffee ? 'coffee' : 'sofa';
      const poi = POI[dest];

      if (targetOccupied(poi.col, poi.row, agent)) {
        // poi occupied — wait a bit more
        agent.timer = 80 + Math.random()*80;
        return;
      }

      agent.state = ST.WALK;
      agent.dest = dest;
      agent.sitting = false;
      moveTo(agent, poi.col, poi.row);
      agent.bubble = phrase('walk');
      agent.bubbleTimer = 60;
      addLog(agent.name, `🚶 идёт к ${dest === 'coffee' ? 'кофемашине' : 'дивану'}`);
      break;
    }

    case ST.WALK: {
      if (!atTarget(agent)) return;
      agent.state = ST.AT_POI;
      agent.timer = (agent.dest === 'coffee' ? 180 : 300) + Math.random()*180;
      agent.bubble = phrase('at_poi');
      agent.bubbleTimer = agent.timer;
      addLog(agent.name, agent.dest === 'coffee' ? '☕ пьёт кофе' : '🛋 отдыхает на диване');
      break;
    }

    case ST.AT_POI: {
      agent.timer--;
      if (agent.timer > 0) return;
      // return to desk
      agent.state = ST.RETURN;
      const d = agent.desk;
      agent.sitting = false;
      moveTo(agent, d.col + 1, d.row + 1);
      agent.bubble = phrase('return');
      agent.bubbleTimer = 60;
      addLog(agent.name, '→ возвращается');
      break;
    }

    case ST.RETURN: {
      if (!atTarget(agent)) return;
      agent.x = agent.tx;
      agent.y = agent.ty;
      agent.state = ST.WORK;
      agent.timer = 350 + Math.random()*400;
      agent.sitting = true;
      agent.bubble = phrase('work');
      agent.bubbleTimer = 100;
      addLog(agent.name, '💻 ' + agent.bubble);
      break;
    }
  }
}

// ── DRAW HELPERS ──────────────────────────────
function rect(x,y,w,h,fill,stroke,lw) {
  cx.fillStyle = fill; cx.fillRect(x,y,w,h);
  if (stroke) { cx.strokeStyle=stroke; cx.lineWidth=lw||1; cx.strokeRect(x+.5,y+.5,w-1,h-1); }
}

function pill(x,y,w,h,r,fill) {
  cx.fillStyle=fill;
  cx.beginPath();
  cx.roundRect(x,y,w,h,r);
  cx.fill();
}

// ── DRAW FLOOR ────────────────────────────────
function drawFloor() {
  for (let c=0; c<COLS; c++) for (let r=0; r<ROWS; r++) {
    cx.fillStyle = (c+r)%2===0 ? FL1 : FL2;
    cx.fillRect(gx(c), gy(r), SZ, SZ);
  }
  // grid lines
  cx.strokeStyle = GRID; cx.lineWidth = 0.4;
  for (let c=0; c<=COLS; c++) {
    cx.beginPath(); cx.moveTo(gx(c), gy(0)); cx.lineTo(gx(c), gy(ROWS)); cx.stroke();
  }
  for (let r=0; r<=ROWS; r++) {
    cx.beginPath(); cx.moveTo(gx(0), gy(r)); cx.lineTo(gx(COLS), gy(r)); cx.stroke();
  }
}

// ── DRAW DESK ─────────────────────────────────
function drawDesk(col, row) {
  const x = gx(col), y = gy(row);
  const W = SZ*2, H = SZ*1.5;
  // desk body
  rect(x+2, y+2, W-4, H-4, DESK, BORD);
  // top highlight
  cx.fillStyle = DESKT; cx.fillRect(x+2, y+2, W-4, 5);
  // monitor base
  const mx = x + W/2 - 14;
  const my = y + 8;
  rect(mx, my, 28, 18, '#0d1117', '#3d4a5c');
  // screen
  cx.fillStyle = '#0a1929'; cx.fillRect(mx+2, my+2, 24, 14);
  // screen glow line
  cx.fillStyle = '#1a4a6a'; cx.fillRect(mx+2, my+2, 24, 2);
  // stand
  cx.fillStyle = '#2a3140';
  cx.fillRect(mx+11, my+18, 6, 5);
  cx.fillRect(mx+7, my+23, 14, 2);
  // keyboard
  rect(x+W/2-14, y+H-12, 28, 7, '#1e2530', '#2a3140');
  // mouse
  cx.fillStyle='#2a3140'; cx.beginPath(); cx.ellipse(x+W/2+20, y+H-9, 4, 5, 0, 0, Math.PI*2); cx.fill();
}

// ── DRAW CHAIR ────────────────────────────────
function drawChair(x, y) {
  cx.fillStyle='#1c2128';
  cx.beginPath(); cx.ellipse(x, y, 11, 8, 0, 0, Math.PI*2); cx.fill();
  cx.strokeStyle='#2d3748'; cx.lineWidth=1.5; cx.stroke();
  // cushion
  cx.fillStyle='#252d3b';
  cx.beginPath(); cx.ellipse(x, y, 8, 6, 0, 0, Math.PI*2); cx.fill();
}

// ── DRAW COFFEE MACHINE ───────────────────────
function drawCoffeeMachine(col, row) {
  const x = gx(col)+6, y = gy(row)+4;
  rect(x, y, 38, 36, '#2a1f14', '#3a2a1a');
  rect(x+2, y+2, 34, 14, '#1a0f08', null);
  cx.fillStyle=GOLD; cx.font='bold 7px monospace'; cx.fillText('COFFEE', x+5, y+12);
  // cup
  cx.fillStyle='#fff'; cx.fillRect(x+13, y+20, 12, 10);
  cx.fillStyle='#5c3a00'; cx.fillRect(x+14, y+22, 10, 6);
  // steam
  cx.strokeStyle='rgba(255,255,255,0.3)'; cx.lineWidth=1.5;
  cx.beginPath(); cx.moveTo(x+17, y+19); cx.quadraticCurveTo(x+19, y+14, x+21, y+17); cx.stroke();
  cx.beginPath(); cx.moveTo(x+21, y+19); cx.quadraticCurveTo(x+23, y+14, x+25, y+17); cx.stroke();
}

// ── DRAW SOFA ─────────────────────────────────
function drawSofa(col, row) {
  const x = gx(col), y = gy(row);
  const W = SZ*2.5, H = SZ*1.2;
  // back
  rect(x, y, W, 16, '#2d3850', BORD);
  // seat
  rect(x, y+16, W, H-16, '#252d3b', BORD);
  // armrests
  rect(x, y, 10, H, '#353f55', BORD);
  rect(x+W-10, y, 10, H, '#353f55', BORD);
  // cushions
  cx.fillStyle='#2d3748';
  cx.fillRect(x+12, y+18, W/2-16, H-24);
  cx.fillRect(x+W/2+4, y+18, W/2-16, H-24);
}

// ── DRAW PLANTS ───────────────────────────────
function drawPlant(x, y) {
  // pot
  cx.fillStyle='#6b3a1f'; cx.fillRect(x-7, y+4, 14, 10);
  cx.fillStyle='#4a2a10'; cx.fillRect(x-5, y, 10, 5);
  // leaves
  cx.fillStyle='#1a4a1a';
  cx.beginPath(); cx.ellipse(x, y-8, 9, 12, -0.2, 0, Math.PI*2); cx.fill();
  cx.fillStyle='#2d6a2d';
  cx.beginPath(); cx.ellipse(x+5, y-5, 7, 9, 0.4, 0, Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse(x-5, y-5, 7, 9, -0.4, 0, Math.PI*2); cx.fill();
  cx.fillStyle='#3a8a3a';
  cx.beginPath(); cx.ellipse(x, y-6, 5, 8, 0, 0, Math.PI*2); cx.fill();
}

// ── DRAW SOUTH PARK CHARACTER ────────────────
// South Park proportions: BIG round head (≈40% of total height),
// short wide body, stubby legs, no visible neck.
// Cartman (Кай) = extra chubby: wider body, bigger head.
function drawSPChar(agent) {
  const {x, y, ch, state, animT, blink, sitting, name} = agent;
  const isCartman = name === 'Кай';
  const isKenny   = name === 'Геннадий';

  const bobY = (state===ST.WORK||state===ST.YOUTUBE||state===ST.PORN)
    ? Math.sin(animT) * 1.5 : 0;

  // ── sizing ──
  const headR  = isCartman ? 15 : 12;      // head radius
  const bodyW  = isCartman ? 28 : 22;      // body width
  const bodyH  = isCartman ? 22 : 18;      // body height
  const legW   = isCartman ? 10 : 8;       // leg width
  const legH   = 10;
  const shoeR  = isCartman ? 7 : 5;

  // baseline: feet at y+legH, body above, head above body
  const feetY  = y + legH;
  const bodyY  = feetY - bodyH;
  const neckY  = bodyY;                    // SP chars have no visible neck
  const headY  = neckY - headR - 1;       // center of head

  cx.save();
  cx.translate(0, bobY);

  // ── shadow ──
  cx.fillStyle = 'rgba(0,0,0,0.3)';
  cx.beginPath();
  cx.ellipse(x, feetY + 4, bodyW/2 + 2, 4, 0, 0, Math.PI*2);
  cx.fill();

  // ── SHOES ──
  cx.fillStyle = ch.shoes;
  cx.beginPath(); cx.ellipse(x - legW/2 - 1, feetY + 2, shoeR, 4, 0, 0, Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse(x + legW/2 + 1, feetY + 2, shoeR, 4, 0, 0, Math.PI*2); cx.fill();

  // ── LEGS / PANTS ──
  cx.fillStyle = ch.pants;
  cx.beginPath();
  cx.roundRect(x - bodyW/2 + 2, bodyY + bodyH - 2, legW, legH + 4, [0,0,3,3]);
  cx.fill();
  cx.beginPath();
  cx.roundRect(x + bodyW/2 - legW - 2, bodyY + bodyH - 2, legW, legH + 4, [0,0,3,3]);
  cx.fill();

  // ── BODY / JACKET ──
  cx.fillStyle = ch.jacket;
  cx.beginPath();
  cx.roundRect(x - bodyW/2, bodyY, bodyW, bodyH, [4, 4, 2, 2]);
  cx.fill();

  // jacket shading (left side darker)
  cx.fillStyle = shade(ch.jacket, -25);
  cx.beginPath();
  cx.roundRect(x - bodyW/2, bodyY, bodyW/2, bodyH, [4, 0, 0, 2]);
  cx.fill();

  // jacket zipper line
  cx.strokeStyle = shade(ch.jacket, -50);
  cx.lineWidth = 1.5;
  cx.beginPath();
  cx.moveTo(x, bodyY + 3);
  cx.lineTo(x, bodyY + bodyH - 3);
  cx.stroke();

  // Kenny parka face cover (scarf/hood strings)
  if (isKenny) {
    cx.fillStyle = ch.scarf || ch.jacket;
    cx.fillRect(x - bodyW/2, bodyY, bodyW, 6);
  }

  // ── HEAD ──
  // SP heads are slightly oval — taller than wide
  cx.fillStyle = ch.skin;
  cx.beginPath();
  cx.ellipse(x, headY, headR, headR + 2, 0, 0, Math.PI*2);
  cx.fill();
  cx.strokeStyle = shade(ch.skin, -35);
  cx.lineWidth = 1;
  cx.stroke();

  // Kenny covers most of face with parka
  if (isKenny) {
    cx.fillStyle = ch.jacket;
    // hood covers forehead + chin, only eyes show
    cx.beginPath();
    cx.ellipse(x, headY + 3, headR + 2, headR + 4, 0, 0, Math.PI*2);
    cx.fill();
    // face hole (oval cutout — skin visible only around eyes)
    cx.fillStyle = ch.skin;
    cx.beginPath();
    cx.ellipse(x, headY + 2, headR - 3, 5, 0, 0, Math.PI*2);
    cx.fill();
  }

  // ── HAT ──
  // brim (flat ellipse)
  cx.fillStyle = ch.hatBrim;
  cx.beginPath();
  cx.ellipse(x, headY - headR, headR + 4, 4, 0, 0, Math.PI*2);
  cx.fill();

  // hat body
  const hatH = isCartman ? 14 : 12;
  cx.fillStyle = ch.hatTop;
  cx.beginPath();
  cx.roundRect(x - headR + 1, headY - headR - hatH, (headR - 1)*2, hatH + 2, [5,5,0,0]);
  cx.fill();
  // hat shading
  cx.fillStyle = shade(ch.hatTop, -20);
  cx.beginPath();
  cx.roundRect(x - headR + 1, headY - headR - hatH, headR - 2, hatH + 2, [5,0,0,0]);
  cx.fill();

  // pom-pom
  cx.fillStyle = ch.hatPom;
  cx.beginPath();
  cx.arc(x, headY - headR - hatH, 4, 0, Math.PI*2);
  cx.fill();

  // earflaps
  if (ch.earflap) {
    cx.fillStyle = ch.hatTop;
    cx.beginPath(); cx.ellipse(x - headR - 2, headY - headR + 4, 4, 7, -0.2, 0, Math.PI*2); cx.fill();
    cx.beginPath(); cx.ellipse(x + headR + 2, headY - headR + 4, 4, 7,  0.2, 0, Math.PI*2); cx.fill();
  }

  // bow (Татьяна/Wendy)
  if (ch.bow) {
    const bx = x, by2 = headY - headR - hatH + 2;
    cx.fillStyle = '#ff69b4';
    cx.beginPath(); cx.ellipse(bx - 6, by2, 6, 4, -0.4, 0, Math.PI*2); cx.fill();
    cx.beginPath(); cx.ellipse(bx + 6, by2, 6, 4,  0.4, 0, Math.PI*2); cx.fill();
    cx.fillStyle = '#ff1493';
    cx.beginPath(); cx.arc(bx, by2, 3, 0, Math.PI*2); cx.fill();
  }

  // ── EYES ──
  const eyeY = headY + (isKenny ? 1 : 0);
  const eyeSpread = isCartman ? 5 : 4;
  if (!blink) {
    // whites
    cx.fillStyle = '#fff';
    cx.beginPath(); cx.arc(x - eyeSpread, eyeY, 2.8, 0, Math.PI*2); cx.fill();
    cx.beginPath(); cx.arc(x + eyeSpread, eyeY, 2.8, 0, Math.PI*2); cx.fill();
    // pupils
    cx.fillStyle = '#1a1a2e';
    cx.beginPath(); cx.arc(x - eyeSpread + 0.5, eyeY + 0.5, 1.6, 0, Math.PI*2); cx.fill();
    cx.beginPath(); cx.arc(x + eyeSpread + 0.5, eyeY + 0.5, 1.6, 0, Math.PI*2); cx.fill();
    // shine
    cx.fillStyle = '#fff';
    cx.beginPath(); cx.arc(x - eyeSpread + 1.2, eyeY - 0.8, 0.7, 0, Math.PI*2); cx.fill();
    cx.beginPath(); cx.arc(x + eyeSpread + 1.2, eyeY - 0.8, 0.7, 0, Math.PI*2); cx.fill();
  } else {
    cx.strokeStyle = '#1a1a2e'; cx.lineWidth = 1.5;
    cx.beginPath(); cx.moveTo(x-eyeSpread-2, eyeY); cx.lineTo(x-eyeSpread+2, eyeY); cx.stroke();
    cx.beginPath(); cx.moveTo(x+eyeSpread-2, eyeY); cx.lineTo(x+eyeSpread+2, eyeY); cx.stroke();
  }

  // ── MOUTH ──
  const mouthY = headY + 5;
  if (!isKenny) {
    cx.lineWidth = 1.2;
    if (state === ST.YOUTUBE || state === ST.PORN) {
      // open oval — surprised
      cx.fillStyle = '#3a1a0a';
      cx.beginPath(); cx.ellipse(x, mouthY, 4, 3.5, 0, 0, Math.PI*2); cx.fill();
      cx.strokeStyle = shade(ch.skin, -50); cx.stroke();
    } else if (state === ST.REST || state === ST.TIRED) {
      cx.strokeStyle = shade(ch.skin, -60);
      cx.beginPath(); cx.moveTo(x-4, mouthY+1); cx.lineTo(x+4, mouthY+1); cx.stroke();
    } else {
      cx.strokeStyle = shade(ch.skin, -60);
      cx.beginPath(); cx.arc(x, mouthY - 1, 4, 0.15, Math.PI - 0.15); cx.stroke();
    }
  }

  cx.restore();

  // ── NAME LABEL ──
  cx.font = 'bold 10px monospace';
  const tw = cx.measureText(name).width;
  const labelY = y + legH + 8 + bobY;
  cx.fillStyle = 'rgba(0,0,0,0.8)';
  cx.beginPath(); cx.roundRect(x - tw/2 - 4, labelY - 10, tw + 8, 13, 3); cx.fill();
  cx.fillStyle = AGENT_COLOR(name);
  cx.fillText(name, x - tw/2, labelY);
}

function AGENT_COLOR(name) {
  const m = {'Кай':'#e8b84b','Степа':'#3fb950','Татьяна':'#ff7b72','Геннадий':'#f0883e','Алексей':'#bc8cff'};
  return m[name]||'#fff';
}

// darken hex color by amt (0-255)
function shade(hex, amt) {
  let n = parseInt(hex.slice(1),16);
  let r = Math.min(255,Math.max(0,((n>>16)&0xff)+amt));
  let g = Math.min(255,Math.max(0,((n>>8)&0xff)+amt));
  let b = Math.min(255,Math.max(0,(n&0xff)+amt));
  return '#'+(r<<16|g<<8|b).toString(16).padStart(6,'0');
}

// ── DRAW SCREEN CONTENT (on desk monitor) ────
function drawScreenContent(desk, state, animT) {
  const x = gx(desk.col)+2 + SZ - 14 + 2;
  const y = gy(desk.row) + 8 + 2;
  const W = 24, H = 14;

  if (state === ST.WORK) {
    // code lines
    cx.fillStyle='#3fb950'; cx.font='5px monospace';
    cx.fillText('> git commit', x, y+5);
    cx.fillStyle='#58a6ff';
    cx.fillText('const ai=', x, y+10);
  } else if (state === ST.YOUTUBE) {
    // red youtube-ish rect
    cx.fillStyle='#ff0000';
    cx.fillRect(x+W/2-7, y+H/2-5, 14, 10);
    cx.fillStyle='#fff';
    cx.beginPath(); cx.moveTo(x+W/2-1, y+H/2-3); cx.lineTo(x+W/2+5, y+H/2); cx.lineTo(x+W/2-1, y+H/2+3); cx.fill();
  } else if (state === ST.PORN) {
    // PornHub colors: black + orange
    cx.fillStyle='#000'; cx.fillRect(x, y, W, H);
    cx.fillStyle='#f90';
    cx.font='bold 5px monospace'; cx.fillText('PH', x+3, y+9);
    cx.fillStyle='#fff'; cx.fillText('orn', x+9, y+9);
    // pulse glow
    cx.fillStyle=`rgba(255,153,0,${0.1+Math.abs(Math.sin(animT))*0.15})`;
    cx.fillRect(x, y, W, H);
  } else if (state === ST.REST) {
    // Zzz
    cx.fillStyle='#8b949e'; cx.font='bold 9px monospace'; cx.fillText('zzz', x+5, y+9);
  }
}

// ── DRAW SPEECH BUBBLE ────────────────────────
function drawBubble(agent) {
  if (agent.bubbleTimer <= 0 || !agent.bubble) return;
  const {x, y, bubble, animT} = agent;
  const bobY = Math.sin(animT)*1.2;
  cx.font='8px monospace';
  const tw = cx.measureText(bubble).width;
  const bw = tw + 10, bh = 15;
  const bx = x - bw/2, by = y - 52 + bobY;
  // box
  cx.fillStyle='rgba(13,17,23,0.93)';
  cx.strokeStyle = AGENT_COLOR(agent.name);
  cx.lineWidth=1;
  cx.beginPath(); cx.roundRect(bx, by, bw, bh, 3); cx.fill(); cx.stroke();
  // tail
  cx.fillStyle='rgba(13,17,23,0.93)';
  cx.beginPath();
  cx.moveTo(x-4, by+bh); cx.lineTo(x+4, by+bh); cx.lineTo(x, by+bh+5);
  cx.fill();
  cx.strokeStyle=AGENT_COLOR(agent.name); cx.lineWidth=1;
  cx.beginPath(); cx.moveTo(x-4, by+bh); cx.lineTo(x, by+bh+5); cx.lineTo(x+4, by+bh); cx.stroke();
  // text
  cx.fillStyle=TXT; cx.fillText(bubble, bx+5, by+10);
}

// ── HEADER ────────────────────────────────────
function drawHeader() {
  rect(0, 0, CV.width, 44, '#161b22', BORD);
  cx.strokeStyle=BORD; cx.lineWidth=1;
  cx.beginPath(); cx.moveTo(0,44); cx.lineTo(CV.width,44); cx.stroke();
  cx.font='bold 13px monospace'; cx.fillStyle=GOLD; cx.fillText('LABS67', 14, 26);
  cx.font='11px monospace'; cx.fillStyle=TXDM; cx.fillText('// OFFICE', 74, 26);
  // agent dots
  let dx = CV.width - 18;
  agents.slice().reverse().forEach(a => {
    cx.beginPath(); cx.arc(dx, 22, 5, 0, Math.PI*2);
    cx.fillStyle=AGENT_COLOR(a.name); cx.fill();
    dx -= 15;
  });
}

// ── MAIN LOOP ─────────────────────────────────
function update() {
  agents.forEach(a => {
    // animation
    a.animT += 0.04;
    // blink
    a.blinkT--;
    if (a.blinkT <= 0) { a.blink = !a.blink; a.blinkT = a.blink ? 8 : 100+Math.random()*140; }
    // bubble
    if (a.bubbleTimer > 0) a.bubbleTimer--;
    // movement
    if (!atTarget(a)) {
      const dx = a.tx - a.x, dy = a.ty - a.y;
      const d = Math.sqrt(dx*dx+dy*dy);
      const spd = 1.4;
      a.x += dx/d*spd; a.y += dy/d*spd;
    }
    // state machine
    nextState(a);
  });
}

function render() {
  cx.clearRect(0, 0, CV.width, CV.height);

  drawFloor();

  // static furniture
  drawSofa(POI.sofa.col, POI.sofa.row);
  drawCoffeeMachine(POI.coffee.col, POI.coffee.row);
  drawPlant(gx(0)+22,  gy(0)+22);
  drawPlant(gx(12)+22, gy(0)+22);
  drawPlant(gx(0)+22,  gy(9)+22);
  drawPlant(gx(12)+22, gy(9)+22);

  // desks + chairs
  Object.entries(DESK_POS).forEach(([name, d]) => {
    drawDesk(d.col, d.row);
    drawChair(gx(d.col)+SZ, gy(d.row)+SZ*1.5-6);
  });

  // screen content for sitting agents
  agents.forEach(a => {
    if (a.sitting && (a.state===ST.WORK||a.state===ST.REST||a.state===ST.YOUTUBE||a.state===ST.PORN)) {
      drawScreenContent(a.desk, a.state, a.animT);
    }
  });

  // agents sorted by y (painter's algo)
  [...agents].sort((a,b)=>a.y-b.y).forEach(a => {
    drawSPChar(a);
    drawBubble(a);
  });

  // room label
  cx.font='10px monospace'; cx.fillStyle=TXDM;
  cx.fillText('LABS67 HQ', gx(9)+4, gy(9)+32);

  drawHeader();
  update();
  requestAnimationFrame(render);
}

// stagger timers
agents.forEach((a,i) => {
  a.timer = 200 + i*90 + Math.random()*200;
  addLog(a.name, '💻 '+phrase('work'));
});

render();
</script>
